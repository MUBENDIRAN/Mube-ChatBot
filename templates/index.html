<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mube's Chatbot</title>
    <link rel="icon" type="image/jpeg" href="/static/mube-chat-bot-logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-black text-light initial-mode" data-bs-theme="dark">
    <div class="aurora-layer" aria-hidden="true">
        <span class="aurora orb-1"></span>
        <span class="aurora orb-2"></span>
        <span class="aurora orb-3"></span>
    </div>

    <div class="app">
        <div class="topbar">
            <button id="toggleSidebar" type="button" aria-label="Toggle chat sidebar" aria-expanded="true">☰</button>
            <button id="newChatBtn" type="button" aria-label="Create new chat">+ New Chat</button>
        </div>

        <div class="app-container">
            <aside id="sidebar" class="sidebar">
                <div id="chatList" class="chat-list">
                    <!-- Chats will be populated here -->
                </div>
            </aside>

            <div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>

            <div class="main" id="chatApp">
                <section id="heroSection" class="hero-section">
                    <h1>How can I help?</h1>
                </section>

                <main id="chatMessages"></main>

                <div id="composerDock">
                    <div class="composer-panel">
                        <form id="chatForm">
                            <textarea
                                id="messageInput"
                                placeholder="Message Mube..."
                                rows="1"
                                maxlength="2000"
                                style="resize: none; max-height: 120px;"></textarea>
                            <button type="submit" id="sendBtn">Send</button>
                        </form>
                        <small class="char-counter"><span id="charCount">0</span>/2000</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
