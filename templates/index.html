<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mube's Chatbot</title>
    <link rel="icon" type="image/jpeg" href="/static/mube-chat-bot-logo.jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-black text-light initial-mode" data-bs-theme="dark">
    <div class="aurora-layer" aria-hidden="true">
        <span class="aurora orb-1"></span>
        <span class="aurora orb-2"></span>
        <span class="aurora orb-3"></span>
    </div>

    <div class="chat-app position-relative d-flex flex-column vh-100 overflow-hidden mx-auto w-100 px-2 px-sm-3">
        <section id="heroSection" class="hero-section text-center px-3">
            <h1 class="display-5 fw-semibold m-0">How can I help?</h1>
        </section>

        <main class="flex-grow-1 overflow-auto py-3 d-none px-1" id="chatMessages"></main>

        <div class="w-100" id="composerDock">
            <div class="border border-secondary-subtle rounded-pill p-2 composer-panel">
                <form id="chatForm" class="d-flex align-items-end gap-2">
                    <textarea
                        id="messageInput"
                        class="form-control border-0 bg-transparent text-light shadow-none rounded-pill px-3"
                        placeholder="Message Mube..."
                        rows="1"
                        maxlength="2000"
                        style="resize: none; max-height: 120px;"></textarea>
                    <button type="submit" class="btn btn-primary rounded-pill px-3" id="sendBtn">Send</button>
                </form>
            </div>
            <small class="text-secondary d-block text-end mt-1"><span id="charCount">0</span>/2000</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
