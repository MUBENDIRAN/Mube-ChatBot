<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mube's Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-white">
    <div class="d-flex flex-column vh-100">
        <!-- Header -->
        <div class="bg-light border-bottom px-4 py-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-0">Mube's Chatbot</h4>
                    <small class="text-muted">Powered by Groq</small>
                </div>
                <button class="btn btn-sm btn-light" id="themeToggle">🌙</button>
            </div>
        </div>

        <!-- Messages Container -->
        <div class="flex-grow-1 overflow-auto p-3" id="chatMessages">
            <div class="text-center text-muted py-4">
                <p>👋 Hey! I'm Mube's Chatbot. How can I help you today?</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-light border-top px-4 py-3">
            <form id="chatForm" class="d-flex gap-2">
                <textarea 
                    id="messageInput" 
                    class="form-control" 
                    placeholder="Ask me anything..." 
                    rows="1"
                    maxlength="2000"
                    style="resize: none; max-height: 120px;"></textarea>
                <button type="submit" class="btn btn-success" id="sendBtn">Send</button>
            </form>
            <small class="text-muted mt-1 d-block"><span id="charCount">0</span>/2000</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
